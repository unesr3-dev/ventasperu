<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Maestro - Fox Phone</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-hover: #0284c7;
            --accent: #22c55e;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-bottom: 2px solid var(--primary);
            border-radius: 12px;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-box input {
            padding: 12px 18px;
            width: 300px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 0.95rem;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--primary);
        }

        .category-filters {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--primary);
            color: #000;
            border-color: var(--primary);
            font-weight: bold;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border-color: var(--primary);
        }

        .img-container {
            width: 100%;
            height: 200px;
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .img-placeholder {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            padding: 10px;
        }

        .product-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            margin-bottom: 5px;
            font-weight: bold;
        }

        .product-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .product-specs {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .product-specs li {
            list-style: none;
            margin-bottom: 3px;
        }

        .price-table {
            background-color: #0f172a;
            border-radius: 8px;
            padding: 10px;
            margin-top: auto;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .price-row:last-child {
            margin-bottom: 0;
            padding-top: 4px;
            border-top: 1px dashed var(--border);
        }

        .price-label {
            color: var(--text-muted);
        }

        .price-val {
            font-weight: bold;
            color: var(--accent);
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }

        .contact-btn {
            display: inline-block;
            background-color: var(--accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

        let currentCategory = 'all';

        function renderProducts(items) {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';

            items.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="img-container">
                        <div class="img-placeholder">[Imagen: ${product.title}]</div>
                    </div>
                    <div class="product-info">
                        <span class="product-tag">${product.category}</span>
                        <h3 class="product-title">${product.title}</h3>
                        <ul class="product-specs">
                            ${product.specs.map(spec => `<li>• ${spec}</li>`).join('')}
                        </ul>
                        <div class="price-table">
                            <div class="price-row">
                                <span class="price-label">Por Caja:</span>
                                <span class="price-val">${product.box}</span>
                            </div>
                            <div class="price-row">
                                <span class="price-label">Por Mayor:</span>
                                <span class="price-val">${product.wholesale}</span>
                            </div>
                            <div class="price-row">
                                <span class="price-label">Unidad:</span>
                                <span class="price-val">${product.unit}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            applyFilters();
        }

        function filterProducts() {
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => {
                const matchesCat = (currentCategory === 'all' || p.category === currentCategory);
                const matchesQuery = p.title.toLowerCase().includes(query) || p.specs.some(s => s.toLowerCase().includes(query));
                return matchesCat && matchesQuery;
            });
            renderProducts(filtered);
        }

        // Carga inicial
        renderProducts(products);
